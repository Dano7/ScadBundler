<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScadBundler Live — combine OpenSCAD files into one</title>
    <base href="/" />
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="css/app.css" />
</head>

<body>
    <!--
      The #app placeholder paints immediately as a branded shell so the page is readable before the WASM
      runtime streams in. Blazor replaces it with the live <App> once the engine is ready (Design §5).
    -->
    <div id="app">
        <div class="page boot">
            <header class="landing">
                <h1>ScadBundler <span class="live">Live</span></h1>
                <p class="tagline">Turn a multi-file OpenSCAD project into one file you can upload anywhere.</p>
            </header>
            <div class="engine-status loading" role="status" aria-live="polite">
                <span class="dot"></span> Engine loading… (a few seconds the first time, cached after)
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unexpected error has occurred.
        <a href="" class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="interop.js"></script>
</body>

</html>
